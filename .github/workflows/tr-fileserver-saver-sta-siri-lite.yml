name: CI/CD tr-fileserver-saver sta-siri-lite

on:
  push:
    paths:
      - "transformers/fileserver-saver/**"
      - "!transformers/fileserver-saver/infrastructure/helm/*"
      - "transformers/fileserver-saver/infrastructure/helm/values.yaml"
      - "transformers/fileserver-saver/infrastructure/sink_config/sta-siri-lite.yaml"
      - ".github/workflows/tr-fileserver-saver-sta-siri-lite.yml"

env:
  WORKING_DIRECTORY: transformers/fileserver-saver
  SINK_CONFIG_PATH: infrastructure/sink_config/sta-siri-lite.yaml
  DOCKER_IMAGE: ghcr.io/noi-techpark/opendatahub-public-transport/tr-fileserver-saver
  DOCKER_TAG: ${{ github.sha }}
  KUBERNETES_NAMESPACE: pt
  VALUES_YAML: infrastructure/helm/values.yaml
  K8S_NAME: tr-fileserver-saver-sta-siri-lite

jobs:
  build:
    runs-on: ubuntu-24.04
    concurrency: tr-fileserver-saver-sta-siri-lite-build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build and push images
        uses: noi-techpark/github-actions/docker-build-and-push@v2
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    concurrency: tr-fileserver-saver-sta-siri-lite-test
    environment: test
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Customize values.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          yq -i '.image.repository="${{ env.DOCKER_IMAGE }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.tag="${{ env.DOCKER_TAG }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.pullPolicy="IfNotPresent"' ${{ env.VALUES_YAML }}
          yq -i '.env.MQ_CLIENT="${{ env.K8S_NAME }}"' ${{ env.VALUES_YAML }}
          yq -i '.env.SERVICE_NAME="${{ env.K8S_NAME }}"' ${{ env.VALUES_YAML }}
          yq -i '.configMap.files["sink-config.yaml"] = load_str("${{ env.SINK_CONFIG_PATH }}")' ${{ env.VALUES_YAML }}

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: ${{ env.K8S_NAME }}
          k8s-namespace: ${{ env.KUBERNETES_NAMESPACE }}
          chart-path: helm/generic-collector
          values-file: ${{ env.WORKING_DIRECTORY }}/${{ env.VALUES_YAML }}
          aws-access-key-id: ${{ secrets[vars.AWS_KEY_ID] }}
          aws-secret-access-key: ${{ secrets[vars.AWS_KEY_SECRET] }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1
